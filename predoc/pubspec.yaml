publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  go_router: ^14.2.7
