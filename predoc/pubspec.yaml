name: predoc
description: "Predoc - Detect Early, Treat Early. Your offline health assistant."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  go_router: ^14.2.7
  cupertino_icons: ^1.0.8
  tflite_flutter: ^0.12.1
  record: ^6.2.0
  camera: ^0.12.0+1
  path_provider: ^2.1.5
  google_mlkit_face_detection: ^0.13.2
  image: ^4.8.0
  http: ^1.2.2
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^6.2.1
  sensors_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
